[package]
name = "forge-icom"
version = "0.1.0"
edition = "2024"
build = "build.rs"

[lib]
name = "forge_icom"
path = "src/lib.rs"

[[bin]]
name = "forge-icom"
path = "src/main.rs"

[dependencies]
chrono = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
toml = "0.9.8"
uuid = { workspace = true }

[build-dependencies]
winres = "0.1"
